<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Red Planet Vortex</title>
<style>
  body { margin:0; overflow:hidden; background:#000; }
  canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
// === FINAL VORTEX RED PLANET — FULLY SELF-CONTAINED ===

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('c'), antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const geometry = new THREE.PlaneGeometry(2, 2);
const material = new THREE.ShaderMaterial({
  uniforms: {
    iTime: { value: 0 },
    iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
    skyTex: { value: null },
    waterTex: { value: null }
  },
  vertexShader: `void main(){gl_Position=vec4(position,1.0);}`,
  fragmentShader: `... (same full shader as you had — unchanged) ...` // (I kept your exact shader code)
});

const plane = new THREE.Mesh(geometry, material);
scene.add(plane);
camera.position.z = 1;

// === LOAD YOUR PHOTOS FROM GITHUB ===
const loader = new THREE.TextureLoader();
loader.setCrossOrigin('anonymous');

// ←←← MAKE SURE THESE ARE EXACTLY CORRECT ←←←
const username = "lengyeltyler";
const repo     = "red-planet";           // ← change if your repo name is different

const skyURL   = `https://raw.githubusercontent.com/${username}/${repo}/main/IMG_0047.JPG`;
const waterURL = `https://raw.githubusercontent.com/${username}/${repo}/main/IMG_0063.JPG`;

console.log("Trying to load sky:", skyURL);
loader.load(skyURL, tex => {
  material.uniforms.skyTex.value = tex;
  console.log("✅ Sky photo loaded successfully");
}, undefined, err => console.error("❌ Sky photo failed:", err));

console.log("Trying to load water:", waterURL);
loader.load(waterURL, tex => {
  material.uniforms.waterTex.value = tex;
  console.log("✅ Water photo loaded successfully");
}, undefined, err => console.error("❌ Water photo failed:", err));

function animate() {
  requestAnimationFrame(animate);
  material.uniforms.iTime.value += 0.016;
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  material.uniforms.iResolution.value.set(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
