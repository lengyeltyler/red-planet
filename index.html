<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Red Planet Vortex — Ocean Edition</title>
<style>
  body { margin:0; overflow:hidden; background:#000; }
  canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
// === SMOOTH LIGHT BLUE OCEAN FLIGHT TOWARD SUNSET ===

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('c'), antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const geometry = new THREE.PlaneGeometry(2, 2);
const material = new THREE.ShaderMaterial({
  uniforms: {
    iTime: { value: 0 },
    iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
    skyTex: { value: null }
  },
  vertexShader: `void main(){gl_Position=vec4(position,1.0);}`,
  fragmentShader: `
    precision highp float;
    uniform float iTime;
    uniform vec2 iResolution;
    uniform sampler2D skyTex;

    #define MAX_STEPS 160
    #define MAX_DIST 2000.0
    #define SURF_DIST 0.001

    float hash(vec2 p){return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453);}
    float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.0-2.0*f);return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);}
    float fbm(vec2 p){float v=0.0,a=0.5;for(int i=0;i<7;i++){v+=a*noise(p);p*=2.02;a*=0.5;}return v;}

    // BEAUTIFUL LIGHT BLUE OCEAN WAVES
    float getOceanHeight(vec2 xz, float time){
      float h = 0.0;
      h += sin(xz.x*0.018 + time*2.3) * 9.0;
      h += sin(xz.y*0.021 + time*1.9) * 7.5;
      h += sin((xz.x + xz.y)*0.042 + time*3.4) * 4.2;
      h += fbm(xz*0.06 + time*1.3) * 5.0;
      h += fbm(xz*0.22 + time*3.1) * 1.5;
      return h + 7.0;
    }

    float map(vec3 p, float time){return p.y - getOceanHeight(p.xz,time);}

    vec3 getNormal(vec3 p, float time){
      vec2 e=vec2(0.002,0.0);
      return normalize(vec3(map(p-e.xyy,time)-map(p+e.xyy,time),2.0*e.x,map(p-e.yyx,time)-map(p+e.yyx,time)));
    }

    vec3 getWaterColor(vec3 p, vec3 nor, float morph, float time){
      float crest = smoothstep(0.65,1.0,nor.y);
      
      vec3 deepWater    = vec3(0.00, 0.18, 0.42);   // rich deep blue
      vec3 surfaceWater = vec3(0.40, 0.82, 1.00);   // bright light blue / cyan
      vec3 foam         = vec3(0.98, 0.98, 1.00);
      
      vec3 col = mix(deepWater, surfaceWater, 0.7 + 0.3*sin(time*4.0 + p.x*0.2));
      col = mix(col, foam, crest * 0.85);
      
      // strong sparkling sun glint
      vec3 sunDir = normalize(vec3(0.85,0.65,-0.35));
      float specular = pow(max(0.0, dot(reflect(-sunDir, nor), normalize(vec3(0,0,1)))), 48.0);
      col += vec3(1.9, 1.7, 1.4) * specular * 3.5 * (1.0 - morph);
      
      // very subtle sunset warmth
      col += vec3(1.0, 0.45, 0.25) * 0.2 * (1.0 - morph);
      
      return col;
    }

    void main(){
      vec2 uv = (gl_FragCoord.xy-0.5*iResolution.xy)/iResolution.y;
      float time = iTime*0.48;

      // Smooth low flight riding above waves toward sunset (NO vortex)
      vec3 ro = vec3(0.0, 14.0 + sin(time*0.8)*2.0, time * 65.0);
      vec3 ta = ro + vec3(0.0, -4.0, 80.0);

      vec3 fwd = normalize(ta-ro);
      vec3 right = normalize(cross(fwd,vec3(0,1,0)));
      vec3 up = cross(right,fwd);
      vec3 rd = normalize(fwd + uv.x*right*1.4 + uv.y*up*1.4);

      float morph = smoothstep(0.0,1.0,(iTime-12.0)*0.06);   // morph starts later

      float t=0.0;
      for(int i=0;i<MAX_STEPS;i++){
        vec3 p = ro + t*rd;
        float d = map(p,time);
        if(d<SURF_DIST || t>MAX_DIST) break;
        t += d*0.72;
      }

      vec3 col;
      if(t < MAX_DIST){
        vec3 p = ro + t*rd;
        vec3 nor = getNormal(p,time);
        col = getWaterColor(p,nor,morph,time);
        vec3 light = normalize(vec3(0.7,1.0,-0.3));
        float dif = clamp(dot(nor,light),0.0,1.0);
        col *= (0.4 + dif*1.55);
        col = mix(col,vec3(0.95,0.65,0.45),1.0-exp(-t*0.0025));
      } else {
        vec2 skyUV = vec2(atan(rd.z,rd.x)*0.159+0.5, clamp(1.0-rd.y*1.7,0.0,1.0));
        col = texture2D(skyTex,skyUV).rgb * 1.15;
        float sun = clamp(dot(rd,normalize(vec3(0.85,0.65,-0.35))),0.0,1.0);
        col += vec3(3.2,1.9,1.0)*pow(sun,32.0)*(1.0-morph);
      }

      col *= 1.0 - 0.2*length(uv);
      gl_FragColor = vec4(col,1.0);
    }
  `
});

const plane = new THREE.Mesh(geometry, material);
scene.add(plane);
camera.position.z = 1;

// Load your sky photo
const loader = new THREE.TextureLoader();
loader.setCrossOrigin('anonymous');

const username = "lengyeltyler";
const repo     = "red-planet";

loader.load(`https://raw.githubusercontent.com/${username}/${repo}/main/IMG_0047.JPG`, tex => {
  material.uniforms.skyTex.value = tex;
  console.log("✅ Sky loaded");
});

function animate() {
  requestAnimationFrame(animate);
  material.uniforms.iTime.value += 0.016;
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  material.uniforms.iResolution.value.set(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
