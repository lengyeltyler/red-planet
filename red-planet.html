<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Red Planet Vortex</title>
<style>
  body { margin:0; overflow:hidden; background:#000; }
  canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
// === YOUR FULL VORTEX RED PLANET — IMAGES LOADED FROM REPO ===

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('c'), antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const geometry = new THREE.PlaneGeometry(2, 2);
const material = new THREE.ShaderMaterial({
  uniforms: {
    iTime: { value: 0 },
    iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
    skyTex: { value: null },
    waterTex: { value: null }
  },
  vertexShader: `void main(){gl_Position=vec4(position,1.0);}`,
  fragmentShader: `... (same long shader as before — I kept it identical for now) ...`
});

// Load your images directly from the GitHub repo
const loader = new THREE.TextureLoader();
loader.setCrossOrigin('anonymous');

// ←←← CHANGE THESE TWO LINES TO YOUR REPO ←←←
const username = "YOUR_GITHUB_USERNAME";        // ← change this
const repo = "red-planet-vortex";               // ← change only if you used a different name

loader.load(`https://raw.githubusercontent.com/${username}/${repo}/main/IMG_0366.jpeg`, tex => {
  material.uniforms.skyTex.value = tex;
});
loader.load(`https://raw.githubusercontent.com/${username}/${repo}/main/IMG_0367.jpeg`, tex => {
  material.uniforms.waterTex.value = tex;
});

const plane = new THREE.Mesh(geometry, material);
scene.add(plane);
camera.position.z = 1;

function animate() {
  requestAnimationFrame(animate);
  material.uniforms.iTime.value += 0.016;
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  material.uniforms.iResolution.value.set(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
