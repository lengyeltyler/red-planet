<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Red Planet Vortex — Your Creation</title>
<style>
  body { margin:0; overflow:hidden; background:#000; }
  canvas { display:block; }
  #dropzone { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="dropzone"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
// === YOUR CINEMATIC VORTEX RED PLANET — FULL VERSION ===
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('c'), antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

let skyTexture = null;
let waterTexture = null;

const geometry = new THREE.PlaneGeometry(2, 2);
const material = new THREE.ShaderMaterial({
  uniforms: {
    iTime: { value: 0 },
    iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
    skyTex: { value: null },
    waterTex: { value: null }
  },
  vertexShader: `void main(){gl_Position=vec4(position,1.0);}`,
  fragmentShader: `
    precision highp float;
    uniform float iTime;
    uniform vec2 iResolution;
    uniform sampler2D skyTex;
    uniform sampler2D waterTex;

    #define MAX_STEPS 140
    #define MAX_DIST 1800.0
    #define SURF_DIST 0.001

    float hash(vec2 p){return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453);}
    float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.0-2.0*f);return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);}
    float fbm(vec2 p){float v=0.0,a=0.5;for(int i=0;i<7;i++){v+=a*noise(p);p*=2.02;a*=0.5;}return v;}

    float getTerrainHeight(vec2 xz, float time){
      float h = fbm(xz*0.008)*38.0 + fbm(xz*0.032)*9.0 + fbm(xz*0.12)*2.8;
      float dist = length(xz);
      float vortex = time*0.9;
      float twist = sin(dist*0.012 - vortex)*14.0 * smoothstep(0.0,900.0,time*45.0);
      h += twist;
      float pit = -smoothstep(0.0,1300.0,time*45.0)*95.0*exp(-dist*0.007);
      h += pit;
      return h;
    }

    float map(vec3 p, float time){return p.y - getTerrainHeight(p.xz,time);}

    vec3 getNormal(vec3 p, float time){
      vec2 e=vec2(0.001,0.0);
      return normalize(vec3(map(p-e.xyy,time)-map(p+e.xyy,time),2.0*e.x,map(p-e.yyx,time)-map(p+e.yyx,time)));
    }

    vec3 getColor(vec3 p, vec3 nor, float morph, float time){
      float h = p.y;
      float grass = smoothstep(12.0,30.0,h+fbm(p.xz*0.1)*4.0);
      vec3 sand = mix(vec3(0.98,0.45,0.30),vec3(1.10,0.60,0.38),fbm(p.xz*0.2));
      vec3 grassCol = vec3(0.25,0.75,0.36)*(0.9+0.7*fbm(p.xz*0.15));
      float valley = smoothstep(8.0,-14.0,h);
      float flow = sin(time*4.2 + p.x*0.9 + p.z*1.3)*0.5;
      vec3 riverCol = vec3(2.4,0.65,0.25)*(1.9+flow);
      vec3 col = sand;
      col = mix(col,grassCol,grass*0.88);
      col = mix(col,riverCol,valley*0.95);
      col += riverCol*1.3*valley*(0.9+sin(time*9.0+p.z*18.0)*0.5);
      col = mix(col,sand*1.3,morph);
      return col;
    }

    void main(){
      vec2 uv = (gl_FragCoord.xy-0.5*iResolution.xy)/iResolution.y;
      float time = iTime*0.48;

      float spiral = time*0.65;
      float radius = 68.0*(1.0-smoothstep(0.0,1300.0,time*45.0)*0.88);
      vec3 ro = vec3(sin(spiral)*radius,19.0+sin(time*0.35)*7.0,time*58.0 + cos(spiral)*radius*0.7);
      vec3 ta = ro + vec3(sin(spiral*1.3)*18.0,-9.0,95.0);

      vec3 fwd = normalize(ta-ro);
      vec3 right = normalize(cross(fwd,vec3(0,1,0)));
      vec3 up = cross(right,fwd);
      vec3 rd = normalize(fwd + uv.x*right*1.4 + uv.y*up*1.4);

      float morph = smoothstep(0.0,1.0,(iTime-6.0)*0.085);

      float t=0.0;
      for(int i=0;i<MAX_STEPS;i++){
        vec3 p = ro + t*rd;
        float d = map(p,time);
        if(d<SURF_DIST || t>MAX_DIST) break;
        t += d*0.75;
      }

      vec3 col;
      if(t < MAX_DIST){
        vec3 p = ro + t*rd;
        vec3 nor = getNormal(p,time);
        col = getColor(p,nor,morph,time);
        vec3 light = normalize(vec3(0.7,1.0,-0.3));
        float dif = clamp(dot(nor,light),0.0,1.0);
        col *= (0.4 + dif*1.4);
        col = mix(col,vec3(0.95,0.65,0.45),1.0-exp(-t*0.0028));
      } else {
        // Use your dragged photo as sky
        vec2 skyUV = vec2(atan(rd.z,rd.x)*0.159+0.5, clamp(1.0-rd.y*1.7,0.0,1.0));
        col = texture2D(skyTex,skyUV).rgb * 1.15;
        float sun = clamp(dot(rd,normalize(vec3(0.85,0.65,-0.35))),0.0,1.0);
        col += vec3(3.2,1.9,1.0)*pow(sun,32.0)*(1.0-morph);
      }

      col *= 1.0 - 0.2*length(uv);
      gl_FragColor = vec4(col,1.0);
    }
  `
});

const plane = new THREE.Mesh(geometry, material);
scene.add(plane);
camera.position.z = 1;

// Drag & drop for your photos
const dropzone = document.getElementById('dropzone');
dropzone.addEventListener('dragover', e => e.preventDefault());
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if(!file) return;
  const url = URL.createObjectURL(file);
  const loader = new THREE.TextureLoader();
  loader.load(url, tex => {
    if(!material.uniforms.skyTex.value) {
      material.uniforms.skyTex.value = tex;
      console.log("Sky photo loaded!");
    } else {
      material.uniforms.waterTex.value = tex;
      console.log("Water/horizon photo loaded!");
    }
  });
});

function animate() {
  requestAnimationFrame(animate);
  material.uniforms.iTime.value += 0.016;
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  material.uniforms.iResolution.value.set(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
